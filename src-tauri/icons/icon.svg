<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242c40"/>
      <stop offset="0.55" stop-color="#141a26"/>
      <stop offset="1" stop-color="#0c1019"/>
    </linearGradient>
    <linearGradient id="prompt" x1="360" y1="330" x2="720" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ff0cf"/>
      <stop offset="0.55" stop-color="#36c9ff"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="296" x2="0" y2="812" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101622"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.3" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sheen)"/>

  <!-- Fleet: two terminal panes peeking behind the main screen -->
  <rect x="248" y="252" width="528" height="120" rx="40" fill="#2b3650" fill-opacity="0.75"/>
  <rect x="300" y="232" width="424" height="120" rx="40" fill="#39456a" fill-opacity="0.6"/>

  <!-- Main terminal screen -->
  <rect x="224" y="300" width="576" height="468" rx="58" fill="url(#screen)"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="3"/>
  <!-- screen title bar dots -->
  <circle cx="296" cy="368" r="15" fill="#ff5f57"/>
  <circle cx="346" cy="368" r="15" fill="#febc2e"/>
  <circle cx="396" cy="368" r="15" fill="#28c840"/>

  <!-- Prompt: chevron + cursor -->
  <g filter="url(#glow)">
    <polyline points="316,500 452,580 316,660" fill="none" stroke="url(#prompt)"
              stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="500" y="628" width="190" height="46" rx="23" fill="url(#prompt)"/>
  </g>

  <!-- inner edge highlight -->
  <rect x="14" y="14" width="996" height="996" rx="220" fill="none"
        stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>
</svg>
