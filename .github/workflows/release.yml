name: Release

# Cut a Linux release by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "1"

jobs:
  release-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies (WebKitGTK 4.1 + Tauri bundling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential curl wget file libssl-dev pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build AppImage + .deb bundles
        run: npx tauri build --bundles appimage deb

      - name: Collect artifacts and SHA256 checksums
        id: artifacts
        run: |
          mkdir -p dist-release
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' \) -exec cp {} dist-release/ \;
          cd dist-release
          sha256sum * > SHA256SUMS.txt
          echo "Released artifacts:"
          cat SHA256SUMS.txt

      - name: Publish GitHub release (unsigned + checksums)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "TermFleet ${GITHUB_REF_NAME}" \
            --notes "Linux preview build (unsigned). Verify downloads against SHA256SUMS.txt." \
            dist-release/*
